box;margin:0;padding:0}\nbody{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;padding:32px 20px;max-width:1280px;margin:0 auto}\nh1{font-size:28px;color:#fff;margin-bottom:4px}\nh2{font-size:20px;color:#fff;margin:36px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}\nh3{font-size:15px;color:var(--orange);margin:18px 0 10px;letter-spacing:.3px}\n.sub{color:var(--mut);font-size:14px;margin-bottom:8px}\np{color:var(--txt);font-size:14px;margin:10px 0}\n.method{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:8px;padding:16px 18px;margin:18px 0;font-size:13px;color:var(--mut)}\n.method b{color:var(--txt)}\n.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}\n.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}\n.kpi .l{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}\n.kpi .v{font-size:24px;color:#fff;font-weight:600;margin-top:4px}\n.kpi .d{font-size:12px;margin-top:2px}\n.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin:16px 0}\n.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}\n.chartbox{position:relative;height:300px}\ntable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}\nth,td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--border)}\nth{color:var(--mut);font-weight:500;text-transform:uppercase;font-size:10.5px;letter-spacing:.4px}\ntd.l,th.l{text-align:left}\ntr:hover td{background:#1c2128}\n.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}\n.tf{background:rgba(247,120,186,.15);color:var(--pink)}\n.tm{background:rgba(88,166,255,.15);color:var(--blue)}\n.pill{font-size:11px;color:var(--mut)}\n.good{color:var(--green)}.bad{color:var(--red)}\nselect{background:var(--card);color:var(--txt);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px}\n.legend{font-size:12px;color:var(--mut);margin:8px 0}\n.foot{color:var(--mut);font-size:12px;margin-top:40px;border-top:1px solid var(--border);padding-top:16px}\n<\/style><\/head><body>\n\n<h1>Heatronics \u2014 Meta Persona Dashboard<\/h1>\n<div class=\"sub\">Who buys what, by age &amp; gender \u2014 purchases attributed to product category, quarter by quarter. Aug 2025 \u2192 May 2026.<\/div>\n\n<div class=\"method\">\n<b>Methodology.<\/b> Category is attributed via <b>campaign name<\/b> \u2014 Meta's link/collection URL is populated on only ~30% of rows at the age\u00d7gender grain, so it is unreliable as the primary key. Campaign name is present on every purchase row and reliably encodes the product hook; the three collection URLs that do surface (<i>period-pain-heating-pads, weighted-heating-pad-for-cervial, knee-joint-pain<\/i>) confirm the mapping. Rows with unknown age or gender are excluded for persona clarity. Attribution window 7-day click / 1-day view. Spend shown is for purchase-bearing rows only (not full-month spend). Quarters: Q3'25 = Aug\u2013Oct, Q4'25 = Nov\u2013Jan, Q1'26 = Feb\u2013Apr, Q2'26 = May (partial).\n<\/div>\n\n<h2>Quarterly purchase totals<\/h2>\n<div class=\"kpis\" id=\"qkpis\"><\/div>\n<p>Winter (Q4'25) was the efficiency peak \u2014 5,676 purchases at 5.27\u00d7 ROAS. Q1'26 scaled spend hardest (\u20b934L on purchase rows) but ROAS fell to 1.80\u00d7 as the brand pushed Cervical volume aggressively into spring, and Q2'26 (May only) sits at 1.38\u00d7 \u2014 the off-season softness already documented in the CAC work.<\/p>\n\n<h2>Persona map \u2014 who buys each category (all 10 months)<\/h2>\n<p class=\"sub\">Share of purchases by age \u00d7 gender. This is the core persona signal: each category has a distinct demographic centre of gravity.<\/p>\n<div class=\"card\"><div class=\"chartbox\" style=\"height:380px\"><canvas id=\"personaChart\"><\/canvas><\/div>\n<div class=\"legend\">Bars stacked by gender; hover any segment for exact purchase counts. Categories ordered by total volume.<\/div><\/div>\n\n<p id=\"personaProse\"><\/p>\n\n<h2>Category deep-dive \u2014 quarter by quarter<\/h2>\n<div class=\"sub\" style=\"margin-bottom:14px\">Pick a category to see how its persona, spend efficiency and reach shifted across quarters.<\/div>\n<select id=\"catSel\"><\/select>\n\n<div class=\"grid2\" style=\"margin-top:16px\">\n<div class=\"card\"><h3>Purchases by age &amp; gender, per quarter<\/h3><div class=\"chartbox\"><canvas id=\"catAgeChart\"><\/canvas><\/div><\/div>\n<div class=\"card\"><h3>Efficiency trend (ROAS &amp; Spend)<\/h3><div class=\"chartbox\"><canvas id=\"catEffChart\"><\/canvas><\/div><\/div>\n<\/div>\n\n<div class=\"card\"><h3>Aligned metrics by quarter<\/h3>\n<table id=\"catTable\"><thead><tr><th class=\"l\">Quarter<\/th><th>Purchases<\/th><th>Spend \u20b9<\/th><th>Revenue \u20b9<\/th><th>ROAS<\/th><th>CTR %<\/th><th>CPM \u20b9<\/th><th class=\"l\">Lead persona<\/th><\/tr><\/thead><tbody><\/tbody><\/table>\n<\/div>\n\n<div class=\"card\"><h3>Cell-level breakdown (selected category, all quarters combined)<\/h3>\n<table id=\"cellTable\"><thead><tr><th class=\"l\">Age<\/th><th class=\"l\">Gender<\/th><th>Purchases<\/th><th>Spend \u20b9<\/th><th>ROAS<\/th><th>CTR %<\/th><th>CPM \u20b9<\/th><\/tr><\/thead><tbody><\/tbody><\/table>\n<\/div>\n\n<div class=\"foot\">Heatronics_Ads (acct 2294012640954204) \u00b7 Meta Ads via Windsor.ai \u00b7 Digistex performance intelligence \u00b7 Generated [\"Q3'25\", \"Q4'25\", \"Q1'26\", \"Q2'26\"] coverage.<\/div>\n\n<script>\nconst D = {\"quarters\": [\"Q3'25\", \"Q4'25\", \"Q1'26\", \"Q2'26\"], \"ages\": [\"18-24\", \"25-34\", \"35-44\", \"45-54\", \"55-64\", \"65+\"], \"categories\": [\"Cervical / Neck\", \"Back / XL / Period\", \"Knee\", \"Knee + XL Bundle\", \"Period / Menstrual\", \"Bed Warmer\", \"Foot Warmer\", \"All / Multi-Product\"], \"data\": {\"Q  \"ctr\": 1.9, \"cpm\": 203.51}, \"55-64|male\": {\"spend\": 115652.12, \"impr\": 459219, \"clicks\": 11887, \"purch\": 219, \"rev\": 327218.06, \"roas\": 2.83, \"ctr\": 2.59, \"cpm\": 251.85}, \"65+|male\": {\"spend\": 64395.35, \"impr\": 201282, \"clicks\": 6794, \"purch\": 89, \"rev\": 124997.89, \"roas\": 1.94, \"ctr\": 3.38, \"cpm\": 319.93}}}};\nconst fmt=n=>n>=1e5?'\u20b9'+(n/1e5).toFixed(1)+'L':'\u20b9'+Math.round(n).toLocaleString('en-IN');\nconst num=n=>Math.round(n).toLocaleString('en-IN');\nconst C={orange:'#ff6b35',blue:'#58a6ff',pink:'#f778ba',green:'#3fb950',red:'#f85149',mut:'#8b949e'};\nChart.defaults.color='#8b949e';Chart.defaults.borderColor='#21262d';Chart.defaults.font.family='-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif';\n\n// quarterly kpis\nconst qt={};\nD.quarters.forEach(q=>{let s=0,p=0,r=0;const c=D.cat_totals[q];for(const k in c){s+=c[k].spend;p+=c[k].purch;r+=c[k].rev;}qt[q]={s,p,r,roas:s?r/s:0};});\ndocument.getElementById('qkpis').innerHTML=D.quarters.map(q=>{\n const t=qt[q];const cls=t.roas>=3?'good':(t.roas<2?'bad':'');\n return `<div class=\"kpi\"><div class=\"l\">${q}<\/div><div class=\"v\">${num(t.p)}<\/div><div class=\"d ${cls}\">${t.roas.toFixed(2)}\u00d7 ROAS \u00b7 ${fmt(t.s)}<\/div><\/div>`;\n}).join('');\n\n// persona stacked chart (all quarters)\nconst cats=D.categories.filter(c=>D.persona_totals[c]);\nconst ages=D.ages;\nfunction sumByAgeGender(cat,gender){return ages.map(a=>{const k=a+'|'+gender;const m=D.persona_totals[cat][k];return m?m.purch:0;});}\n// build: x=categories, stacked female/male, but we want age detail -> use grouped by age within gender too complex.\n// Simpler strong persona view: x=categories, one dataset per age band, but split gender via two charts? \n// Chosen: x=categories, stacked datasets = age bands, and a gender toggle is overkill. Show stacked age, plus prose handles gender.\nconst ageColors=['#3fb950','#58a6ff','#ff6b35','#f778ba','#a371f7','#d29922'];\nconst personaDsAll={};\nconst fDS=ages.map((a,i)=>({label:a,backgroundColor:ageColors[i],stack:'female',data:cats.map(c=>{const m=D.persona_totals[c][a+'|female'];return m?m.purch:0;})}));\nconst mDS=ages.map((a,i)=>({label:a+' ',backgroundColor:ageColors[i],stack:'male',data:cats.map(c=>{const m=D.persona_totals[c][a+'|male'];return m?m.purch:0;})}));\nnew Chart(document.getElementById('personaChart'),{type:'bar',data:{labels:cats,datasets:[...fDS,...mDS]},\n options:{maintainAspectRatio:false,responsive:true,\n  plugins:{legend:{display:false},\n   tooltip:{callbacks:{title:(it)=>cats[it[0].dataIndex],label:(c)=>{const stk=c.dataset.stack;return `${stk} ${c.dataset.label.trim()}: ${num(c.raw)}`;}}},\n   title:{display:true,text:'Left stack = Female \u00b7 Right stack = Male (per category)',color:'#8b949e',font:{size:12}}},\n  scales:{x:{stacked:true,ticks:{maxRotation:30,minRotation:0,font:{size:11}}},y:{stacked:true,title:{display:true,text:'Purchases'}}}}});\n\n// persona prose\nconst proseBits=[];\ncats.forEach(c=>{\n const cells=Object.entries(D.persona_totals[c]).sort((a,b)=>b[1].purch-a[1].purch);\n const tot=cells.reduce((s,x)=>s+x[1].purch,0);\n let f=0,m=0;cells.forEach(([k,v])=>{k.endsWith('female')?f+=v.purch:m+=v.purch;});\n const top=cells[0];const [ta,tg]=top[0].split('|');\n const skew=f>m?`${Math.round(f/tot*100)}% female`:`${Math.round(m/tot*100)}% male`;\n proseBits.push(`<b>${c}<\/b> (${num(tot)} buyers) skews ${skew}, led by ${ta} ${tg}.`);\n});\ndocument.getElementById('personaProse').innerHTML='The categories split cleanly along gender lines. '+proseBits.join(' ')+' In practice this means Cervical, Period and the softer pain categories should be served female-led creative aged 35+, while Knee and the Knee+XL bundle \u2014 the male-dominated volume engine \u2014 want male 25-54 messaging.';\n\n// category selector\nconst sel=document.getElementById('catSel');\ncats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});\nlet ageChart,effChart;\nfunction persona(cellObj){\n const e=Object.entries(cellObj).sort((a,b)=>b[1].purch-a[1].purch)[0];\n if(!e)return '\u2014';const [a,g]=e[0].split('|');return `${a} ${g}`;\n}\nfunction render(cat){\n // age chart per quarter (stacked gender), x=quarter\n const qs=D.quarters;\n const fData=qs.map(q=>{const cc=D.data[q][cat];if(!cc)return 0;return Object.entries(cc).filter(([k])=>k.endsWith('female')).reduce((s,[,v])=>s+v.purch,0);});\n const mData=qs.map(q=>{const cc=D.data[q][cat];if(!cc)return 0;return Object.entries(cc).filter(([k])=>k.endsWith('male')).reduce((s,[,v])=>s+v.purch,0);});\n if(ageChart)ageChart.destroy();\n ageChart=new Chart(document.getElementById('catAgeChart'),{type:'bar',data:{labels:qs,datasets:[\n   {label:'Female',backgroundColor:C.pink,data:fData},{label:'Male',backgroundColor:C.blue,data:mData}]},\n  options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true,title:{display:true,text:'Purchases'}}}}});\n // eff chart\n const roas=qs.map(q=>{const t=D.cat_totals[q][cat];return t?t.roas:null;});\n const spend=qs.map(q=>{const t=D.cat_totals[q][cat];return t?t.spend:null;});\n if(effChart)effChart.destroy();\n effChart=new Chart(document.getElementById('catEffChart'),{data:{labels:qs,datasets:[\n   {type:'bar',label:'Spend \u20b9',data:spend,backgroundColor:'rgba(255,107,53,.4)',borderColor:C.orange,yAxisID:'y'},\n   {type:'line',label:'ROAS',data:roas,borderColor:C.green,backgroundColor:C.green,tension:.3,yAxisID:'y1',pointRadius:4}]},\n  options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{\n   y:{position:'left',title:{display:true,text:'Spend \u20b9'},ticks:{callback:v=>fmt(v)}},\n   y1:{position:'right',title:{display:true,text:'ROAS'},grid:{drawOnChartArea:false}}}}});\n // table per quarter\n const tb=document.querySelector('#catTable tbody');tb.innerHTML='';\n qs.forEach(q=>{const t=D.cat_totals[q][cat];const cc=D.data[q][cat];\n  if(!t){tb.innerHTML+=`<tr><td class=\"l\">${q}<\/td><td colspan=\"7\" class=\"l\" style=\"color:var(--mut)\">no spend<\/td><\/tr>`;return;}\n  const rcls=t.roas>=3?'good':(t.roas<2?'bad':'');\n  tb.innerHTML+=`<tr><td class=\"l\">${q}<\/td><td>${num(t.purch)}<\/td><td>${num(t.spend)}<\/td><td>${num(t.rev)}<\/td><td class=\"${rcls}\">${t.roas.toFixed(2)}\u00d7<\/td><td>${t.ctr.toFixed(2)}<\/td><td>${t.cpm.toFixed(0)}<\/td><td class=\"l\">${persona(cc)}<\/td><\/tr>`;});\n // cell table combined\n const cb=document.querySelector('#cellTable tbody');cb.innerHTML='';\n const combined=D.persona_totals[cat]||{};\n Object.entries(combined).sort((a,b)=>b[1].purch-a[1].purch).forEach(([k,v])=>{\n  const [a,g]=k.split('|');const tag=g==='female'?'<span class=\"tag tf\">F<\/span>':'<span class=\"tag tm\">M<\/span>';\n  const rcls=v.roas>=3?'good':(v.roas<2?'bad':'');\n  cb.innerHTML+=`<tr><td class=\"l\">${a}<\/td><td class=\"l\">${tag}<\/td><td>${num(v.purch)}<\/td><td>${num(v.spend)}<\/td><td class=\"${rcls}\">${v.roas.toFixed(2)}\u00d7<\/td><td>${v.ctr.toFixed(2)}<\/td><td>${v.cpm.toFixed(0)}<\/td><\/tr>`;});\n}\nsel.addEventListener('change',e=>render(e.target.value));\nrender(cats[0]);\n<\/script>\n<\/body><\/html>", "ltv": "<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Heatronics \u2014 Customer LTV<\/title>\n<script src=\"https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js\"><\/script>\n<style>\n:root{--bg:#0d1117;--card:#161b22;--border:#21262d;--txt:#c9d1d9;--mut:#8b949e;--orange:#ff6b35;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--pink:#f778ba;}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;padding:32px 20px;max-width:1280px;margin:0 auto}\nh1{font-size:28px;color:#fff;margin-bottom:4px}\nh2{font-size:20px;color:#fff;margin:34px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}\nh3{font-size:15px;color:var(--orange);margin:16px 0 10px}\n.sub{color:var(--mut);font-size:14px;margin-bottom:8px}\np{font-size:14px;margin:10px 0}\n.method{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:8px;padding:16px 18px;margin:16px 0;font-size:13px;color:var(--mut)}\n.method b{color:var(--txt)}\n.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}\n.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}\n.kpi .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}\n.kpi .v{font-size:23px;color:#fff;font-weight:600;margin-top:4px}\n.kpi .d{font-size:12px;margin-top:2px}\n.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin:16px 0}\n.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}\n.chartbox{position:relative;height:300px}\ntable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}\nth,td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--border)}\nth{color:var(--mut);font-weight:500;text-transform:uppercase;font-size:10.5px;letter-spacing:.4px}\ntd.l,th.l{text-align:left}\ntr:hover td{background:#1c2128}\n.good{color:var(--green)}.bad{color:var(--red)}\n.foot{color:var(--mut);font-size:12px;margin-top:40px;border-top:1px solid var(--border);padding-top:16px}\n@media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}\n<\/style><\/head><body>\n<h1>Heatronics \u2014 Customer Lifetime Value<\/h1>\n<div class=\"sub\">10-month view (Aug 2025 \u2013 Jun 2026). Identity = mobile number, fallback email. Acquisition-cohort basis.<\/div>\n\n<div class=\"method\">\n<b>How LTV is computed.<\/b> Each customer identity = normalised <b>mobile number<\/b> (last 10 digits), falling back to email when phone is absent, so guest and account checkouts that share a phone merge into one customer. <b>Historical LTV<\/b> = Shopify <i>customer_total_spent<\/i> (net of refunds/discounts) summed per identity = AOV \u00d7 purchase frequency. <b>Predictive LTV<\/b> = AOV \u00d7 frequency \u00d7 60% assumed gross margin. Customers are bucketed by the calendar month they were <i>created<\/i>; a December cohort has had longer to repeat than an April cohort, so falling repeat rates partly reflect less elapsed time. Aug & May/Jun are partial windows. Voided (COD-cancelled) order lines excluded; SKU field is empty in the feed so product_id is the product key.\n<\/div>\n\n<div class=\"kpis\" id=\"kpis\"><\/div>\n\n<h2>LTV & revenue trend<\/h2>\n<div class=\"grid2\">\n<div class=\"card\"><h3>Historical LTV per buyer<\/h3><div class=\"chartbox\"><canvas id=\"ltvChart\"><\/canvas><\/div><\/div>\n<div class=\"card\"><h3>Revenue & buyers<\/h3><div class=\"chartbox\"><canvas id=\"revChart\"><\/canvas><\/div><\/div>\n<\/div>\n<p id=\"prose1\"><\/p>\n\n<h2>Repeat behaviour & basket<\/h2>\n<div class=\"grid2\">\n<div class=\"card\"><h3>Repeat rate & purchase frequency<\/h3><div class=\"chartbox\"><canvas id=\"repChart\"><\/canvas><\/div><\/div>\n<div class=\"card\"><h3>Products & units per customer<\/h3><div class=\"chartbox\"><canvas id=\"prodChart\"><\/canvas><\/div><\/div>\n<\/div>\n<p id=\"prose2\"><\/p>\n\n<h2>Monthly detail<\/h2>\n<div class=\"card\"><table id=\"tbl\"><thead><tr>\n<th class=\"l\">Month<\/th><th>Buyers<\/th><th>Revenue<\/th><th>AOV<\/th><th>Freq<\/th><th>Repeat%<\/th><th>Hist LTV<\/th><th>Pred LTV<\/th><th>Avg Products<\/th><\/tr><\/thead><tbody><\/tbody><\/table><\/div>\n\n<h2>Top products & cities (10 months)<\/h2>\n<div class=\"grid2\">\n<div class=\"card\"><h3>Top products by units<\/h3><table id=\"prodTbl\"><thead><tr><th class=\"l\">Product<\/th><th>Units<\/th><\/tr><\/thead><tbody><\/tbody><\/table><\/div>\n<div class=\"card\"><h3>Top cities by revenue<\/h3><table id=\"cityTbl\"><thead><tr><th class=\"l\">City<\/th><th>Revenue<\/th><\/tr><\/thead><tbody><\/tbody><\/table><\/div>\n<\/div>\n\n<div class=\"foot\">Heatronics (heatronicss.myshopify.com) \u00b7 Shopify via Windsor.ai \u00b7 Digistex \u00b7 Data window: 2025-08-12 to 2026-06-11 \u00b7 generated 2026-06-11. Source data exported to heatronics_shopify_master.json / heatronics_ltv_export.xlsx for reuse.<\/div>\n\n<script>\nconst D={\"monthly\": [{\"month\": \"2025-08\", \"identities\": 106, \"buyers\": 51, \"revenue\": 87938, \"orders\": 65, \"aov\": 1353, \"freq\": 1.275, \"repeat_rate\": 0.196, \"hist_ltv\": 1724, \"pred_ltv\": 1035, \"cust_with_orders\": 53, \"avg_products\": 1.094, \"avg_units\": 1.132}, {\"month\": \"2025-09\", \"identities\": 930, \"buyers\": 529, \"revenue\": 812608, \"orders\": 661, \"aov\": 1229, \"freq\": 1.25, \"repeat_rate\": 0.172, \"hist_ltv\": 1536, \"pred_ltv\": 922, \"cust_with_orders\": 522, \"avg_products\": 1.08, \"avg_units\": 1.103}, {\"month\": \"2025-10\", \"identities\": 2404, \"buyers\": 1386, \"revenue\": 2546856, \"orders\": 1755, \"aov\": 1451, \"freq\": 1.266, \"repeat_rate\": 0.19, \"hist_ltv\": 1838, \"pred_ltv\": 1103, \"cust_with_orders\": 1377, \"avg_products\": 1.131, \"avg_units\": 1.179}, {\"month\": \"2025-11\", \"identities\": 4150, \"buyers\": 2482, \"revenue\": 4863907, \"orders\": 3082, \"aov\": 1578, \"freq\": 1.242, \"repeat_rate\": 0.184, \"hist_ltv\": 1960, \"pred_ltv\": 1176, \"cust_with_orders\": 2553, \"avg_products\": 1.145, \"avg_units\": 1.201}, {\"month\": \"2025-12\", \"identities\": 5101, \"buyers\": 2905, \"revenue\": 5778383, \"orders\": 3466, \"aov\": 1667, \"freq\": 1.193, \"repeat_rate\": 0.152, \"hist_ltv\": 1989, \"pred_ltv\": 1193, \"cust_with_orders\": 3136, \"avg_products\": 1.16, \"avg_units\": 1.226}, {\"month\": \"2026-01\", \"identities\": 4434, \"buyers\": 2679, \"revenue\": 4854847, \"orders\": 3019, \"aov\": 1608, \"freq\": 1.127, \"repeat_rate\": 0.11, \"hist_ltv\": 1812, \"pred_ltv\": 1087, \"cust_with_orders\": 2993, \"avg_products\": 1.114, \"avg_units\": 1.169}, {\"month\": \"2026-02\", \"identities\": 3160, \"buyers\": 1917, \"revenue\": 3207210, \"orders\": 2102, \"aov\": 1526, \"freq\": 1.097, \"repeat_rate\": 0.08, \"hist_ltv\": 1673, \"pred_ltv\": 1004, \"cust_with_orders\": 2054, \"avg_products\": 1.113, \"avg_units\": 1.138}, {\"month\": \"2026-03\", \"identities\": 1954, \"buyers\": 1283, \"revenue\": 2157951, \"orders\": 1387, \"aov\": 1556, \"freq\": 1.081, \"repeat_rate\": 0.069, \"hist_ltv\": 1682, \"pred_ltv\": 1009, \"cust_with_orders\": 1373, \"avg_products\": 1.117, \"avg_units\": 1.143}, {\"month\": \"2026-04\", \"identities\": 3077, \"buyers\": 1090, \"revenue\": 1813215, \"orders\": 1162, \"aov\": 1560, \"freq\": 1.066, \"repeat_rate\": 0.058, \"hist_ltv\": 1664, \"pred_ltv\": 998, \"cust_with_orders\": 1156, \"avg_products\": 1.089, \"avg_units\": 1.11}, {\"month\": \"2026-05\", \"identities\": 1608, \"buyers\": 330, \"revenue\": 507938, \"orders\": 339, \"aov\": 1498, \"freq\": 1.027, \"repeat_rate\": 0.024, \"hist_ltv\": 1539, \"pred_ltv\": 924, \"cust_with_orders\": 933, \"avg_products\": 1.071, \"avg_units\": 1.088}], \"top_products\": [{\"product\": \"Cervical Heating Pad for Stiff Neck & Frozen Shoulder \\u2013 Analog by Heat\", \"units\": 3557}, {\"product\": \"Cervical Heating Pad for Stiff Neck & Frozen Shoulder \\u2013 Digital by Hea\", \"units\": 3177}, {\"product\": \"Extra Large Heating Pad for Back & Shoulder \\u2013 Analog by Heatronics\", \"units\": 2341}, {\"product\": \"Extra Large Heating Pad for Full Body Relief \\u2013 Digital by Heatronics\", \"units\": 2251}, {\"product\": \"Single Bed Warmer for Winters \\u2013 Analog by Heatronics\", \"units\": 1725}, {\"product\": \"Knee Heating Pad with Temperature Control \\u2013 Digital by Heatronics\", \"units\": 1380}, {\"product\": \"Knee Heating Pad for Joint & Arthritis \\u2013 Analog by Heatronics\", \"units\": 1184}, {\"product\": \"Foot Warmer Heating Pad for Cold Feet \\u2013 Analog by Heatronics\", \"units\": 869}, {\"product\": \"Heating Pad for Period and Back \\u2013 Regular Size, Analog by Heatronics\", \"units\": 704}, {\"product\": \"Foot Warmer with Auto-Cutoff \\u2013 Digital by Heatronics\", \"units\": 627}, {\"product\": \"Single Bed Heating Blanket with Auto-Cutoff \\u2013 Digital by Heatronics\", \"units\": 573}, {\"product\": \"Double Bed Warmer for Couples \\u2013 Analog by Heatronics\", \"units\": 278}, {\"product\": \"Double Bed Heating Blanket with Timer \\u2013 Digital by Heatronics\", \"units\": 227}, {\"product\": \"Heating Pad for Period & Back \\u2013 Regular Size, Digital by Heatronics\", \"units\": 196}, {\"product\": \"Executive Heated Backrest Cushion for Office Chair \\u2013 Analog by Heatron\", \"units\": 29}], \"top_cities\": [{\"city\": \"Delhi\", \"revenue\": 998735}, {\"city\": \"Mumbai\", \"revenue\": 393122}, {\"city\": \"Gurgaon\", \"revenue\": 326616}, {\"city\": \"New Delhi\", \"revenue\": 323215}, {\"city\": \"Ghaziabad\", \"revenue\": 250351}, {\"city\": \"Noida\", \"revenue\": 244369}, {\"city\": \"Ludhiana\", \"revenue\": 237457}, {\"city\": \"Bangalore\", \"revenue\": 233154}, {\"city\": \"Pune\", \"revenue\": 229718}, {\"city\": \"Hyderabad\", \"revenue\": 193556}, {\"city\": \"Lucknow\", \"revenue\": 179127}, {\"city\": \"Jaipur\", \"revenue\": 159296}, {\"city\": \"Chandigarh\", \"revenue\": 142108}, {\"city\": \"Dehradun\", \"revenue\": 131427}, {\"city\": \"Kolkata\", \"revenue\": 130684}], \"generated\": \"2026-06-11T14:51:24.983603\", \"window\": \"2025-08-12 to 2026-06-11\"};\nconst fmt=n=>n>=1e5?'INR '+(n/1e5).toFixed(1)+'L':'INR '+Math.round(n).toLocaleString('en-IN');\nconst num=n=>Math.round(n).toLocaleString('en-IN');\nconst C={orange:'#ff6b35',blue:'#58a6ff',green:'#3fb950',red:'#f85149',pink:'#f778ba',mut:'#8b949e'};\nChart.defaults.color='#8b949e';Chart.defaults.borderColor='#21262d';\nconst M=D.monthly, labels=M.map(r=>r.month);\n\n// KPIs (blended, excluding partial-edge distortion by using totals)\nconst totRev=M.reduce((s,r)=>s+r.revenue,0);\nconst totBuy=M.reduce((s,r)=>s+r.buyers,0);\nconst totOrd=M.reduce((s,r)=>s+r.orders,0);\nconst blAov=totRev/totOrd, blLtv=totRev/totBuy;\nconst peak=M.reduce((a,r)=>r.hist_ltv>a.hist_ltv?r:a,M[0]);\ndocument.getElementById('kpis').innerHTML=[\n ['Total revenue',fmt(totRev),M.length+' months'],\n ['Total buyers',num(totBuy),'unique identities'],\n ['Blended AOV',fmt(blAov),''],\n ['Blended LTV/buyer',fmt(blLtv),'peak '+fmt(peak.hist_ltv)+' ('+peak.month+')'],\n].map(k=>`<div class=\"kpi\"><div class=\"l\">${k[0]}<\/div><div class=\"v\">${k[1]}<\/div><div class=\"d\">${k[2]}<\/div><\/div>`).join('');\n\nnew Chart(ltvChart,{type:'line',data:{labels,datasets:[\n {label:'Hist LTV',data:M.map(r=>r.hist_ltv),borderColor:C.orange,backgroundColor:'rgba(255,107,53,.15)',fill:true,tension:.3,pointRadius:3},\n {label:'AOV',data:M.map(r=>r.aov),borderColor:C.blue,tension:.3,pointRadius:2}]},\n options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>fmt(v)}}}}});\n\nnew Chart(revChart,{data:{labels,datasets:[\n {type:'bar',label:'Revenue',data:M.map(r=>r.revenue),backgroundColor:'rgba(255,107,53,.4)',borderColor:C.orange,yAxisID:'y'},\n {type:'line',label:'Buyers',data:M.map(r=>r.buyers),borderColor:C.green,backgroundColor:C.green,tension:.3,yAxisID:'y1',pointRadius:3}]},\n options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{\n  y:{position:'left',ticks:{callback:v=>fmt(v)}},y1:{position:'right',grid:{drawOnChartArea:false}}}}});\n\nnew Chart(repChart,{data:{labels,datasets:[\n {type:'bar',label:'Repeat %',data:M.map(r=>+(r.repeat_rate*100).toFixed(1)),backgroundColor:'rgba(247,120,186,.4)',borderColor:C.pink,yAxisID:'y'},\n {type:'line',label:'Freq (orders/buyer)',data:M.map(r=>r.freq),borderColor:C.blue,tension:.3,yAxisID:'y1',pointRadius:3}]},\n options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{\n  y:{position:'left',title:{display:true,text:'Repeat %'}},y1:{position:'right',min:1,grid:{drawOnChartArea:false}}}}});\n\nnew Chart(prodChart,{type:'line',data:{labels,datasets:[\n {label:'Avg products/customer',data:M.map(r=>r.avg_products),borderColor:C.orange,tension:.3,pointRadius:3},\n {label:'Avg units/customer',data:M.map(r=>r.avg_units),borderColor:C.green,tension:.3,pointRadius:3}]},\n options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{min:1}}}});\n\ndocument.getElementById('prose1').innerHTML='Customer value tracks the heat-therapy season tightly. Historical LTV per buyer peaks in <b>'+peak.month+'<\/b> at '+fmt(peak.hist_ltv)+' and erodes through spring, even though AOV barely moves (steady ~INR 1,500\u20131,650 all year). The swing is driven by how many customers come back, not how much they spend per order.';\ndocument.getElementById('prose2').innerHTML='Repeat rate falls from ~19% in peak winter to low single digits by May \u2014 partly real seasonality, partly because recent cohorts have had less time to reorder. Basket stays thin throughout: ~1.1 distinct products and units per customer, so cross-sell is the clearest untapped lever (bundles, second-product offers in post-purchase WhatsApp).';\n\nconst tb=document.querySelector('#tbl tbody');\nM.forEach(r=>{const cls=r.repeat_rate>=0.12?'good':(r.repeat_rate<0.06?'bad':'');\n tb.innerHTML+=`<tr><td class=\"l\">${r.month}<\/td><td>${num(r.buyers)}<\/td><td>${fmt(r.revenue)}<\/td><td>${num(r.aov)}<\/td><td>${r.freq.toFixed(2)}<\/td><td class=\"${cls}\">${(r.repeat_rate*100).toFixed(1)}%<\/td><td>${num(r.hist_ltv)}<\/td><td>${num(r.pred_ltv)}<\/td><td>${r.avg_products.toFixed(2)}<\/td><\/tr>`;});\n\nconst pt=document.querySelector('#prodTbl tbody');\nD.top_products.forEach(p=>pt.innerHTML+=`<tr><td class=\"l\">${p.product}<\/td><td>${num(p.units)}<\/td><\/tr>`);\nconst ct=document.querySelector('#cityTbl tbody');\nD.top_cities.forEach(c=>ct.innerHTML+=`<tr><td class=\"l\">${c.city}<\/td><td>${fmt(c.revenue)}<\/td><\/tr>`);\n<\/script><\/body><\/html>", "multisku": "<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Heatronics \u2014 Multi-SKU & Entry Product<\/title>\n<script src=\"https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js\"><\/script>\n<style>\n:root{--bg:#0d1117;--card:#161b22;--border:#21262d;--txt:#c9d1d9;--mut:#8b949e;--orange:#ff6b35;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--pink:#f778ba;--purple:#a371f7;--yellow:#d29922;}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;padding:32px 20px;max-width:1280px;margin:0 auto}\nh1{font-size:28px;color:#fff;margin-bottom:4px}\nh2{font-size:20px;color:#fff;margin:34px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}\nh3{font-size:15px;color:var(--orange);margin:16px 0 10px}\n.sub{color:var(--mut);font-size:14px;margin-bottom:8px}\np{font-size:14px;margin:10px 0}\n.method{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:8px;padding:16px 18px;margin:16px 0;font-size:13px;color:var(--mut)}\n.method b{color:var(--txt)}\n.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}\n.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}\n.kpi .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}\n.kpi .v{font-size:23px;color:#fff;font-weight:600;margin-top:4px}\n.kpi .d{font-size:12px;margin-top:2px}\n.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin:16px 0}\n.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}\n.chartbox{position:relative;height:320px}\ntable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}\nth,td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--border)}\nth{color:var(--mut);font-weight:500;text-transform:uppercase;font-size:10.5px;letter-spacing:.4px}\ntd.l,th.l{text-align:left}\ntr:hover td{background:#1c2128}\n.good{color:var(--green)}.bad{color:var(--red)}\n.foot{color:var(--mut);font-size:12px;margin-top:40px;border-top:1px solid var(--border);padding-top:16px}\n@media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}\n<\/style><\/head><body>\n<h1>Heatronics \u2014 Multi-Product Buyers & Entry Product<\/h1>\n<div class=\"sub\">Do customers buy more than one product, and what gets them in the door? Aug 2025 \u2013 Jun 2026.<\/div>\n\n<div class=\"method\">\n<b>How this is built.<\/b> A customer = unique email (the order feed carries no phone). Their products are counted as <b>distinct product categories<\/b> across every order they placed, with analog/digital and colour variants of the same item collapsed into one category (e.g. all cervical pads = \"Cervical\"). \"Multi-product\" means a customer bought 2+ distinct categories \u2014 whether in <b>one order<\/b> (e.g. heating pad + bed warmer together) or across <b>repeat orders<\/b> later. Customers are grouped by their <b>acquisition month<\/b> = the month of their first order. <b>Entry product<\/b> = the category in that first order. Voided orders excluded; recent months show lower multi-rates partly because those customers have had less time to place a second order. Aug & Jun are partial windows.\n<\/div>\n\n<div class=\"kpis\" id=\"kpis\"><\/div>\n\n<h2>Part 1 \u2014 Multi-product customers, month on month<\/h2>\n<div class=\"grid2\">\n<div class=\"card\"><h3>Multi-product rate (%)<\/h3><div class=\"chartbox\"><canvas id=\"pctChart\"><\/canvas><\/div><\/div>\n<div class=\"card\"><h3>Multi-product customers (absolute)<\/h3><div class=\"chartbox\"><canvas id=\"absChart\"><\/canvas><\/div><\/div>\n<\/div>\n<p id=\"prose1\"><\/p>\n\n<div class=\"card\"><h3>How the second product is bought: same order vs later repeat<\/h3>\n<div class=\"chartbox\" style=\"height:300px\"><canvas id=\"splitChart\"><\/canvas><\/div><\/div>\n\n<div class=\"card\"><h3>Monthly detail<\/h3>\n<table id=\"tbl\"><thead><tr><th class=\"l\">Month<\/th><th>Customers<\/th><th>Multi-SKU<\/th><th>Multi %<\/th><th>Same-order<\/th><th>Via repeat<\/th><th>Avg products<\/th><\/tr><\/thead><tbody><\/tbody><\/table><\/div>\n\n<h2>Part 2 \u2014 Entry product (first purchase) by quarter<\/h2>\n<div class=\"card\"><h3>Share of new customers by entry product<\/h3>\n<div class=\"chartbox\" style=\"height:360px\"><canvas id=\"entryChart\"><\/canvas><\/div><\/div>\n<p id=\"prose2\"><\/p>\n\n<div class=\"card\"><h3>Entry product detail (customers acquired with each product as their first)<\/h3>\n<table id=\"entryTbl\"><thead><tr><th class=\"l\">Entry Product<\/th><th>Q3 2025<\/th><th>Q4 2025<\/th><th>Q1 2026<\/th><th>Q2 2026<\/th><th>Total<\/th><\/tr><\/thead><tbody><\/tbody><\/table><\/div>\n\n<div class=\"foot\">Heatronics (heatronicss.myshopify.com) \u00b7 Shopify via Windsor.ai \u00b7 Digistex \u00b7 Built from saved master export (no re-pull).<\/div>\n\n<script>\nconst D={\"part1\": [{\"month\": \"2025-08\", \"customers\": 53, \"multi\": 11, \"multi_pct\": 20.8, \"multi_single\": 3, \"multi_repeat\": 8, \"avg_products\": 1.283}, {\"month\": \"2025-09\", \"customers\": 520, \"multi\": 66, \"multi_pct\": 12.7, \"multi_single\": 36, \"multi_repeat\": 30, \"avg_products\": 1.173}, {\"month\": \"2025-10\", \"customers\": 1353, \"multi\": 206, \"multi_pct\": 15.2, \"multi_single\": 119, \"multi_repeat\": 87, \"avg_products\": 1.194}, {\"month\": \"2025-11\", \"customers\": 2479, \"multi\": 364, \"multi_pct\": 14.7, \"multi_single\": 229, \"multi_repeat\": 135, \"avg_products\": 1.188}, {\"month\": \"2025-12\", \"customers\": 2958, \"multi\": 438, \"multi_pct\": 14.8, \"multi_single\": 305, \"multi_repeat\": 133, \"avg_products\": 1.181}, {\"month\": \"2026-01\", \"customers\": 2764, \"multi\": 290, \"multi_pct\": 10.5, \"multi_single\": 208, \"multi_repeat\": 82, \"avg_products\": 1.128}, {\"month\": \"2026-02\", \"customers\": 1948, \"multi\": 187, \"multi_pct\": 9.6, \"multi_single\": 145, \"multi_repeat\": 42, \"avg_products\": 1.117}, {\"month\": \"2026-03\", \"customers\": 1306, \"multi\": 131, \"multi_pct\": 10.0, \"multi_single\": 93, \"multi_repeat\": 38, \"avg_products\": 1.129}, {\"month\": \"2026-04\", \"customers\": 1092, \"multi\": 87, \"multi_pct\": 8.0, \"multi_single\": 63, \"multi_repeat\": 24, \"avg_products\": 1.096}, {\"month\": \"2026-05\", \"customers\": 880, \"multi\": 48, \"multi_pct\": 5.5, \"multi_single\": 40, \"multi_repeat\": 8, \"avg_products\": 1.064}, {\"month\": \"2026-06\", \"customers\": 227, \"multi\": 12, \"multi_pct\": 5.3, \"multi_single\": 12, \"multi_repeat\": 0, \"avg_products\": 1.062}], \"entry_month\": {\"2025-08\": {\"Other\": 25, \"Foot Warmer\": 3, \"Cervical\": 9, \"Knee\": 5, \"Single Bed Warmer\": 3, \"XL Pad\": 10, \"Period/Back\": 1}, \"2025-09\": {\"XL Pad\": 180, \"Cervical\": 119, \"Knee\": 87, \"Other\": 36, \"Single Bed Warmer\": 40, \"Foot Warmer\": 8, \"Period/Back\": 59, \"Backrest\": 11, \"Double Bed Warmer\": 7}, \"2025-10\": {\"Knee\": 208, \"XL Pad\": 422, \"Cervical\": 395, \"Period/Back\": 78, \"Single Bed Warmer\": 166, \"Double Bed Warmer\": 34, \"Foot Warmer\": 170, \"Backrest\": 8}, \"2025-11\": {\"Cervical\": 750, \"Single Bed Warmer\": 447, \"XL Pad\": 628, \"Knee\": 296, \"Foot Warmer\": 420, \"Double Bed Warmer\": 107, \"Period/Back\": 81, \"Backrest\": 3}, \"2025-12\": {\"Foot Warmer\": 370, \"Cervical\": 974, \"XL Pad\": 705, \"Single Bed Warmer\": 584, \"Double Bed Warmer\": 138, \"Knee\": 389, \"Period/Back\": 129}, \"2026-01\": {\"Cervical\": 1154, \"Knee\": 316, \"Double Bed Warmer\": 111, \"Single Bed Warmer\": 476, \"XL Pad\": 612, \"Foot Warmer\": 218, \"Period/Back\": 101, \"Backrest\": 5}, \"2026-02\": {\"Single Bed Warmer\": 56, \"Cervical\": 1025, \"Period/Back\": 126, \"XL Pad\": 500, \"Knee\": 338, \"Backrest\": 5, \"Foot Warmer\": 55, \"Double Bed Warmer\": 5}, \"2026-03\": {\"XL Pad\": 397, \"Cervical\": 716, \"Knee\": 181, \"Period/Back\": 74, \"Backrest\": 5, \"Foot Warmer\": 23, \"Single Bed Warmer\": 21}, \"2026-04\": {\"XL Pad\": 369, \"Cervical\": 528, \"Period/Back\": 56, \"Knee\": 175, \"Foot Warmer\": 22, \"Single Bed Warmer\": 14}, \"2026-05\": {\"Cervical\": 449, \"XL Pad\": 223, \"Knee\": 188, \"Period/Back\": 50, \"Foot Warmer\": 9, \"Single Bed Warmer\": 8}, \"2026-06\": {\"Knee\": 44, \"Cervical\": 113, \"XL Pad\": 67, \"Period/Back\": 15, \"Foot Warmer\": 2}}, \"entry_qtr\": {\"Q3 2025 (Aug-Oct)\": {\"Other\": 61, \"Foot Warmer\": 181, \"Cervical\": 523, \"Knee\": 300, \"Single Bed Warmer\": 209, \"XL Pad\": 612, \"Period/Back\": 138, \"Backrest\": 19, \"Double Bed Warmer\": 41}, \"Q4 2025 (Nov-Jan)\": {\"Cervical\": 2878, \"Single Bed Warmer\": 1507, \"XL Pad\": 1945, \"Knee\": 1001, \"Foot Warmer\": 1008, \"Double Bed Warmer\": 356, \"Period/Back\": 311, \"Backrest\": 8}, \"Q1 2026 (Feb-Apr)\": {\"Single Bed Warmer\": 91, \"Cervical\": 2269, \"Period/Back\": 256, \"XL Pad\": 1266, \"Knee\": 694, \"Backrest\": 10, \"Foot Warmer\": 100, \"Double Bed Warmer\": 5}, \"Q2 2026 (May-Jun)\": {\"Cervical\": 562, \"XL Pad\": 290, \"Knee\": 232, \"Period/Back\": 65, \"Foot Warmer\": 11, \"Single Bed Warmer\": 8}}, \"entry_total\": {\"Other\": 61, \"Foot Warmer\": 1300, \"Cervical\": 6232, \"Knee\": 2227, \"Single Bed Warmer\": 1815, \"XL Pad\": 4113, \"Period/Back\": 770, \"Backrest\": 37, \"Double Bed Warmer\": 402}};\nconst num=n=>Math.round(n).toLocaleString('en-IN');\nconst C={orange:'#ff6b35',blue:'#58a6ff',green:'#3fb950',red:'#f85149',pink:'#f778ba',purple:'#a371f7',yellow:'#d29922',mut:'#8b949e'};\nChart.defaults.color='#8b949e';Chart.defaults.borderColor='#21262d';\nconst P=D.part1, labels=P.map(r=>r.month);\n\nconst totC=P.reduce((s,r)=>s+r.customers,0);\nconst totM=P.reduce((s,r)=>s+r.multi,0);\nconst peak=P.reduce((a,r)=>r.multi_pct>a.multi_pct?r:a,P[0]);\nconst sameTot=P.reduce((s,r)=>s+r.multi_single,0);\nconst repTot=P.reduce((s,r)=>s+r.multi_repeat,0);\ndocument.getElementById('kpis').innerHTML=[\n ['Total customers',num(totC),'Aug\u2013Jun'],\n ['Multi-product buyers',num(totM),(totM/totC*100).toFixed(1)+'% overall'],\n ['Peak multi-rate',peak.multi_pct+'%',peak.month],\n ['Same-order vs repeat',num(sameTot)+' / '+num(repTot),'cross-sell vs winback'],\n].map(k=>`<div class=\"kpi\"><div class=\"l\">${k[0]}<\/div><div class=\"v\">${k[1]}<\/div><div class=\"d\">${k[2]}<\/div><\/div>`).join('');\n\nnew Chart(pctChart,{type:'line',data:{labels,datasets:[\n {label:'Multi-product %',data:P.map(r=>r.multi_pct),borderColor:C.orange,backgroundColor:'rgba(255,107,53,.15)',fill:true,tension:.3,pointRadius:3}]},\n options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v+'%'}}}}});\n\nnew Chart(absChart,{type:'bar',data:{labels,datasets:[\n {label:'Single-product',data:P.map(r=>r.customers-r.multi),backgroundColor:'rgba(139,148,158,.4)'},\n {label:'Multi-product',data:P.map(r=>r.multi),backgroundColor:C.orange}]},\n options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true}}}});\n\nnew Chart(splitChart,{type:'bar',data:{labels,datasets:[\n {label:'Multi in one order (cross-sell)',data:P.map(r=>r.multi_single),backgroundColor:C.blue},\n {label:'Multi via later repeat (winback)',data:P.map(r=>r.multi_repeat),backgroundColor:C.pink}]},\n options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true}}}});\n\ndocument.getElementById('prose1').innerHTML='Across the full window <b>'+(totM/totC*100).toFixed(1)+'%<\/b> of customers ('+num(totM)+' of '+num(totC)+') bought more than one distinct product. The rate peaks in winter ('+peak.month+' at '+peak.multi_pct+'%) and falls toward spring. Most multi-product buying happens <b>within a single order<\/b> ('+num(sameTot)+' customers) rather than through a later repeat ('+num(repTot)+'), so the bundle/add-on at checkout is doing more work than post-purchase winback.';\n\n// entry chart - stacked % by quarter\nconst Q=['Q3 2025 (Aug-Oct)','Q4 2025 (Nov-Jan)','Q1 2026 (Feb-Apr)','Q2 2026 (May-Jun)'];\nconst cats=Object.keys(D.entry_total).sort((a,b)=>D.entry_total[b]-D.entry_total[a]);\nconst palette=[C.orange,C.blue,C.green,C.pink,C.purple,C.yellow,C.red,'#79c0ff','#8b949e'];\nconst ds=cats.map((cat,i)=>({label:cat,backgroundColor:palette[i%palette.length],\n data:Q.map(q=>{const d=D.entry_qtr[q]||{};const tot=Object.values(d).reduce((s,v)=>s+v,0);return tot?+(((d[cat]||0)/tot*100).toFixed(1)):0;})}));\nnew Chart(entryChart,{type:'bar',data:{labels:Q.map(q=>q.split(' (')[0]),datasets:ds},\n options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.raw+'%'}}},\n  scales:{x:{stacked:true},y:{stacked:true,max:100,ticks:{callback:v=>v+'%'}}}}});\n\ndocument.getElementById('prose2').innerHTML='<b>Cervical is the dominant entry product and getting more so<\/b> \u2014 it brings in 32% of new customers in winter and <b>48% by Q1\u2013Q2 2026<\/b>, making it the clear top-of-funnel hero. XL Pad is the steady #2 (~22\u201329%). Seasonal entries spike then vanish: Single Bed Warmer and Foot Warmer together pull ~28% of Q4 newcomers but almost none by spring. The takeaway: acquisition leans hardest on Cervical, while Bed/Foot warmers are winter-only doorways.';\n\nconst tb=document.querySelector('#tbl tbody');\nP.forEach(r=>{const cls=r.multi_pct>=13?'good':(r.multi_pct<8?'bad':'');\n tb.innerHTML+=`<tr><td class=\"l\">${r.month}<\/td><td>${num(r.customers)}<\/td><td>${num(r.multi)}<\/td><td class=\"${cls}\">${r.multi_pct}%<\/td><td>${num(r.multi_single)}<\/td><td>${num(r.multi_repeat)}<\/td><td>${r.avg_products.toFixed(2)}<\/td><\/tr>`;});\n\nconst et=document.querySelector('#entryTbl tbody');\ncats.forEach(cat=>{\n const cells=Q.map(q=>{const d=D.entry_qtr[q]||{};const tot=Object.values(d).reduce((s,v)=>s+v,0);const v=d[cat]||0;return tot?`${num(v)} <span style=\"color:var(--mut)\">(${Math.round(v/tot*100)}%)<\/span>`:'0';});\n et.innerHTML+=`<tr><td class=\"l\">${cat}<\/td><td>${cells[0]}<\/td><td>${cells[1]}<\/td><td>${cells[2]}<\/td><td>${cells[3]}<\/td><td>${num(D.entry_total[cat])}<\/td><\/tr>`;});\n<\/script><\/body><\/html>", "cohort": "<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Heatronics \u2014 Cohort & Sequence<\/title>\n<script src=\"https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js\"><\/script>\n<style>\n:root{--bg:#0d1117;--card:#161b22;--border:#21262d;--txt:#c9d1d9;--mut:#8b949e;--orange:#ff6b35;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--pink:#f778ba;--purple:#a371f7;--yellow:#d29922;}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;padding:32px 20px;max-width:1280px;margin:0 auto}\nh1{font-size:28px;color:#fff;margin-bottom:4px}\nh2{font-size:20px;color:#fff;margin:34px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}\nh3{font-size:15px;color:var(--orange);margin:16px 0 10px}\n.sub{color:var(--mut);font-size:14px;margin-bottom:8px}\np{font-size:14px;margin:10px 0}\n.method{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:8px;padding:16px 18px;margin:16px 0;font-size:13px;color:var(--mut)}\n.method b{color:var(--txt)}\n.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}\n.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}\n.kpi .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}\n.kpi .v{font-size:23px;color:#fff;font-weight:600;margin-top:4px}\n.kpi .d{font-size:12px;margin-top:2px}\n.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin:16px 0}\n.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}\n.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}\n.chartbox{position:relative;height:300px}\ntable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}\nth,td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--border)}\nth{color:var(--mut);font-weight:500;text-transform:uppercase;font-size:10.5px;letter-spacing:.4px}\ntd.l,th.l{text-align:left}\ntr:hover td{background:#1c2128}\n.good{color:var(--green)}.bad{color:var(--red)}\n.flow{font-size:13px;line-height:2}\n.flow .step{display:inline-block;background:#1c2128;border:1px solid var(--border);border-radius:6px;padding:3px 10px;margin:2px}\n.flow .arrow{color:var(--orange);margin:0 4px}\n.pct{color:var(--mut);font-size:11px}\n.foot{color:var(--mut);font-size:12px;margin-top:40px;border-top:1px solid var(--border);padding-top:16px}\n@media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2,.grid3{grid-template-columns:1fr}}\n<\/style><\/head><body>\n<h1>Heatronics \u2014 Cohort Sequence & Repeat Timing<\/h1>\n<div class=\"sub\">What customers buy first, second, third \u2014 and how fast they come back. Aug 2025 \u2013 Jun 2026.<\/div>\n\n<div class=\"method\">\n<b>How this is built.<\/b> Each customer = unique email. Their orders are sorted in time, and the analysis records the order in which each <b>new product category<\/b> first appears (analog/digital + colour variants collapsed). \"1st product\" = entry; \"2nd / 3rd\" = the next distinct categories they add, whether in the same order or a later one. Transition tables read as: <i>given the entry product, what is the most common next product<\/i>. Repeat timing = days between a customer's consecutive orders (gaps 0\u2013400 days). Voided orders excluded; the order feed has no phone so identity is email (98.9% populated).\n<\/div>\n\n<div class=\"kpis\" id=\"kpis\"><\/div>\n\n<h2>The product ladder \u2014 1st \u2192 2nd \u2192 3rd<\/h2>\n<div class=\"grid3\">\n<div class=\"card\"><h3>1st product (entry)<\/h3><div class=\"chartbox\"><canvas id=\"p1\"><\/canvas><\/div><\/div>\n<div class=\"card\"><h3>2nd product<\/h3><div class=\"chartbox\"><canvas id=\"p2\"><\/canvas><\/div><\/div>\n<div class=\"card\"><h3>3rd product<\/h3><div class=\"chartbox\"><canvas id=\"p3\"><\/canvas><\/div><\/div>\n<\/div>\n<p id=\"prose1\"><\/p>\n\n<h2>Most common journeys (entry \u2192 2nd \u2192 3rd)<\/h2>\n<div class=\"card\"><div class=\"flow\" id=\"flows\"><\/div><\/div>\n\n<h2>Transition \u2014 what's bought next, given the entry product<\/h2>\n<div class=\"card\"><table id=\"transTbl\"><thead><tr><th class=\"l\">Entry product<\/th><th>Buyers w/ 2nd<\/th><th class=\"l\">Most common 2nd product \u2192<\/th><\/tr><\/thead><tbody><\/tbody><\/table><\/div>\n\n<h2>Repeat purchase timing<\/h2>\n<div class=\"grid2\">\n<div class=\"card\"><h3>How fast customers reorder<\/h3><div class=\"chartbox\"><canvas id=\"timeChart\"><\/canvas><\/div>\n<p class=\"sub\" id=\"timeProse\"><\/p><\/div>\n<div class=\"card\"><h3>Repeat tendency by entry product<\/h3><div class=\"chartbox\"><canvas id=\"repChart\"><\/canvas><\/div><\/div>\n<\/div>\n\n<div class=\"card\"><h3>Repeat detail by entry product<\/h3>\n<table id=\"repTbl\"><thead><tr><th class=\"l\">Entry product<\/th><th>Buyers<\/th><th>Repeated<\/th><th>Repeat %<\/th><th>Avg gap (days)<\/th><th>Median gap<\/th><\/tr><\/thead><tbody><\/tbody><\/table><\/div>\n<p id=\"prose2\"><\/p>\n\n<div class=\"foot\">Heatronics (heatronicss.myshopify.com) \u00b7 Shopify via Windsor.ai \u00b7 Digistex \u00b7 Built from saved master export (no re-pull).<\/div>\n\n<script>\nconst D={\"sequence\": {\"1\": {\"Other\": 60, \"Foot Warmer\": 1017, \"Cervical\": 6177, \"Knee\": 1832, \"Bed Warmer\": 1682, \"XL Pad\": 3759, \"Period/Back\": 541, \"Backrest\": 18, \"Double Bed Warmer\": 335}, \"2\": {\"XL Pad\": 426, \"Knee\": 441, \"Other\": 1, \"Cervical\": 207, \"Period/Back\": 227, \"Bed Warmer\": 210, \"Backrest\": 4, \"Double Bed Warmer\": 69, \"Foot Warmer\": 255}, \"3\": {\"Period/Back\": 40, \"Bed Warmer\": 39, \"Knee\": 109, \"Cervical\": 38, \"Foot Warmer\": 70, \"Backrest\": 11, \"XL Pad\": 20, \"Double Bed Warmer\": 24}}, \"reached\": {\"customers\": 15421, \"reached2\": 1840, \"reached3\": 351}, \"entry_to_second\": {\"Other\": {\"XL Pad\": 6, \"Cervical\": 2, \"Period/Back\": 2, \"Bed Warmer\": 1}, \"Foot Warmer\": {\"XL Pad\": 20, \"Knee\": 15, \"Backrest\": 1, \"Cervical\": 35, \"Period/Back\": 29, \"Bed Warmer\": 10, \"Double Bed Warmer\": 14}, \"Cervical\": {\"Knee\": 226, \"Bed Warmer\": 88, \"XL Pad\": 354, \"Backrest\": 2, \"Foot Warmer\": 106, \"Period/Back\": 87, \"Double Bed Warmer\": 12}, \"Knee\": {\"Other\": 1, \"XL Pad\": 28, \"Cervical\": 45, \"Period/Back\": 44, \"Foot Warmer\": 50, \"Bed Warmer\": 9, \"Double Bed Warmer\": 3}, \"XL Pad\": {\"Knee\": 153, \"Cervical\": 88, \"Period/Back\": 43, \"Bed Warmer\": 90, \"Foot Warmer\": 47, \"Backrest\": 1, \"Double Bed Warmer\": 3}, \"Bed Warmer\": {\"Double Bed Warmer\": 27, \"Cervical\": 28, \"Knee\": 39, \"XL Pad\": 9, \"Foot Warmer\": 50, \"Period/Back\": 21}, \"Period/Back\": {\"Knee\": 5, \"XL Pad\": 8, \"Double Bed Warmer\": 10, \"Cervical\": 6, \"Bed Warmer\": 1}, \"Double Bed Warmer\": {\"Bed Warmer\": 11, \"Period/Back\": 1, \"Knee\": 3, \"Cervical\": 3, \"XL Pad\": 1, \"Foot Warmer\": 1}, \"Backrest\": {\"Foot Warmer\": 1}}, \"second_to_third\": {\"XL Pad\": {\"Period/Back\": 9, \"Cervical\": 5, \"Bed Warmer\": 20, \"Knee\": 65, \"Foot Warmer\": 25, \"Double Bed Warmer\": 3, \"Backrest\": 3}, \"Knee\": {\"Bed Warmer\": 7, \"Cervical\": 14, \"Foot Warmer\": 31, \"XL Pad\": 6, \"Double Bed Warmer\": 5, \"Period/Back\": 12, \"Backrest\": 4}, \"Bed Warmer\": {\"Knee\": 18, \"Foot Warmer\": 9, \"Cervical\": 6, \"Double Bed Warmer\": 4, \"Period/Back\": 4}, \"Cervical\": {\"Knee\": 16, \"Foot Warmer\": 5, \"Period/Back\": 1, \"Bed Warmer\": 6, \"XL Pad\": 8, \"Double Bed Warmer\": 2, \"Backrest\": 1}, \"Period/Back\": {\"Cervical\": 8, \"Backrest\": 1, \"Double Bed Warmer\": 3, \"XL Pad\": 3, \"Knee\": 2, \"Bed Warmer\": 1}, \"Foot Warmer\": {\"Bed Warmer\": 4, \"Knee\": 7, \"Cervical\": 5, \"XL Pad\": 1, \"Period/Back\": 14, \"Double Bed Warmer\": 7, \"Backrest\": 2}, \"Backrest\": {\"XL Pad\": 1}, \"Double Bed Warmer\": {\"Knee\": 1, \"Bed Warmer\": 1, \"XL Pad\": 1}}, \"repeat_timing\": {\"n\": 1281, \"avg\": 26.7, \"median\": 14, \"p25\": 5, \"p75\": 35, \"within30\": 71.1, \"within90\": 93.7}, \"repeat_by_entry\": {\"Other\": {\"buyers\": 60, \"repeat\": 11, \"repeat_pct\": 18.3, \"avg_gap\": 94.1, \"median_gap\": 87}, \"Foot Warmer\": {\"buyers\": 1017, \"repeat\": 116, \"repeat_pct\": 11.4, \"avg_gap\": 22.9, \"median_gap\": 9.0}, \"Cervical\": {\"buyers\": 6177, \"repeat\": 375, \"repeat_pct\": 6.1, \"avg_gap\": 25.9, \"median_gap\": 14}, \"Knee\": {\"buyers\": 1832, \"repeat\": 135, \"repeat_pct\": 7.4, \"avg_gap\": 23, \"median_gap\": 13}, \"Bed Warmer\": {\"buyers\": 1682, \"repeat\": 213, \"repeat_pct\": 12.7, \"avg_gap\": 25.1, \"median_gap\": 15}, \"XL Pad\": {\"buyers\": 3759, \"repeat\": 360, \"repeat_pct\": 9.6, \"avg_gap\": 29.2, \"median_gap\": 15.0}, \"Period/Back\": {\"buyers\": 541, \"repeat\": 27, \"repeat_pct\": 5.0, \"avg_gap\": 27.9, \"median_gap\": 16}, \"Double Bed Warmer\": {\"buyers\": 335, \"repeat\": 43, \"repeat_pct\": 12.8, \"avg_gap\": 25.3, \"median_gap\": 19}}};\nconst num=n=>Math.round(n).toLocaleString('en-IN');\nconst C={orange:'#ff6b35',blue:'#58a6ff',green:'#3fb950',red:'#f85149',pink:'#f778ba',purple:'#a371f7',yellow:'#d29922',mut:'#8b949e'};\nconst palette=[C.orange,C.blue,C.green,C.pink,C.purple,C.yellow,C.red];\nChart.defaults.color='#8b949e';Chart.defaults.borderColor='#21262d';\n\nconst R=D.reached;\ndocument.getElementById('kpis').innerHTML=[\n ['Customers analysed',num(R.customers),''],\n ['Reached 2nd product',num(R.reached2),(R.reached2/R.customers*100).toFixed(1)+'%'],\n ['Reached 3rd product',num(R.reached3),(R.reached3/R.customers*100).toFixed(1)+'%'],\n ['Median repeat gap',D.repeat_timing.median+' days',D.repeat_timing.within30+'% within 30d'],\n].map(k=>`<div class=\"kpi\"><div class=\"l\">${k[0]}<\/div><div class=\"v\">${k[1]}<\/div><div class=\"d\">${k[2]}<\/div><\/div>`).join('');\n\nfunction donut(id,obj){\n const ent=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,7);\n const tot=ent.reduce((s,e)=>s+e[1],0);\n new Chart(document.getElementById(id),{type:'doughnut',data:{labels:ent.map(e=>e[0]),\n  datasets:[{data:ent.map(e=>e[1]),backgroundColor:palette,borderColor:'#161b22',borderWidth:2}]},\n  options:{maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:10,font:{size:11}}},\n   tooltip:{callbacks:{label:c=>c.label+': '+num(c.raw)+' ('+(c.raw/tot*100).toFixed(0)+'%)'}}}}});\n}\ndonut('p1',D.sequence['1']);donut('p2',D.sequence['2']);donut('p3',D.sequence['3']);\n\ndocument.getElementById('prose1').innerHTML='<b>Cervical (40%) and XL Pad (24%) are the front door<\/b> \u2014 together two-thirds of all first purchases. But the ladder shifts as customers go deeper: <b>Knee is the #1 second product (24%)<\/b> and the #1 third product (31%), and Foot Warmer climbs from 14% of 2nd buys to 20% of 3rd. So the typical expansion path is a big pain-relief pad first, then Knee, then Foot Warmer \u2014 Knee and Foot Warmer are accessory/expansion products, rarely the entry.';\n\n// flows: build top journeys entry->2nd->3rd\nconst e2=D.entry_to_second, s3=D.second_to_third;\nconst entryTot={}; Object.keys(e2).forEach(k=>entryTot[k]=Object.values(e2[k]).reduce((s,v)=>s+v,0));\nconst topEntries=Object.keys(entryTot).sort((a,b)=>entryTot[b]-entryTot[a]).slice(0,5);\nlet fh='';\ntopEntries.forEach(en=>{\n const sec=e2[en]; const secTot=Object.values(sec).reduce((s,v)=>s+v,0);\n const top2=Object.entries(sec).sort((a,b)=>b[1]-a[1])[0];\n if(!top2)return;\n const third=s3[top2[0]]; let t3='';\n if(third){const tt=Object.values(third).reduce((s,v)=>s+v,0);const top3=Object.entries(third).sort((a,b)=>b[1]-a[1])[0];\n  if(top3)t3=`<span class=\"arrow\">\u2192<\/span><span class=\"step\">${top3[0]} <span class=\"pct\">${(top3[1]/tt*100).toFixed(0)}%<\/span><\/span>`;}\n fh+=`<div><span class=\"step\" style=\"border-color:var(--orange)\">${en}<\/span><span class=\"arrow\">\u2192<\/span><span class=\"step\">${top2[0]} <span class=\"pct\">${(top2[1]/secTot*100).toFixed(0)}%<\/span><\/span>${t3}<\/div>`;\n});\ndocument.getElementById('flows').innerHTML=fh;\n\n// transition table\nconst tb=document.querySelector('#transTbl tbody');\ntopEntries.concat(Object.keys(e2).filter(k=>!topEntries.includes(k))).forEach(en=>{\n const sec=e2[en]; if(!sec)return; const tot=Object.values(sec).reduce((s,v)=>s+v,0); if(tot<10)return;\n const top=Object.entries(sec).sort((a,b)=>b[1]-a[1]).slice(0,3);\n const chain=top.map(t=>`${t[0]} <span class=\"pct\">${(t[1]/tot*100).toFixed(0)}%<\/span>`).join(' \u00b7 ');\n tb.innerHTML+=`<tr><td class=\"l\">${en}<\/td><td>${tot}<\/td><td class=\"l\">${chain}<\/td><\/tr>`;\n});\n\n// repeat timing buckets\nconst T=D.repeat_timing;\nnew Chart(timeChart,{type:'bar',data:{labels:['\u226430 days','31-90 days','>90 days'],\n datasets:[{data:[T.within30,T.within90-T.within30,100-T.within90],\n  backgroundColor:[C.green,C.blue,C.mut]}]},\n options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw.toFixed(0)+'% of repeat buyers'}}},\n  scales:{y:{ticks:{callback:v=>v+'%'},max:100}}}});\ndocument.getElementById('timeProse').innerHTML='Median gap <b>'+T.median+' days<\/b>, average '+T.avg+'. When customers come back, they come back fast \u2014 <b>'+T.within30+'% within a month<\/b>, '+T.within90+'% within a quarter. This is mostly accessory add-ons shortly after the first pad, not a seasonal re-buy cycle.';\n\n// repeat by entry\nconst RB=D.repeat_by_entry;\nconst cats=Object.keys(RB).sort((a,b)=>RB[b].repeat_pct-RB[a].repeat_pct);\nnew Chart(repChart,{type:'bar',data:{labels:cats,datasets:[\n {label:'Repeat %',data:cats.map(c=>RB[c].repeat_pct),backgroundColor:C.orange}]},\n options:{maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>v+'%'}}}}});\n\nconst rt=document.querySelector('#repTbl tbody');\nObject.keys(RB).sort((a,b)=>RB[b].buyers-RB[a].buyers).forEach(c=>{\n const d=RB[c];const cls=d.repeat_pct>=11?'good':(d.repeat_pct<6?'bad':'');\n rt.innerHTML+=`<tr><td class=\"l\">${c}<\/td><td>${num(d.buyers)}<\/td><td>${num(d.repeat)}<\/td><td class=\"${cls}\">${d.repeat_pct}%<\/td><td>${d.avg_gap.toFixed(0)}<\/td><td>${d.median_gap.toFixed(0)}<\/td><\/tr>`;\n});\nconst best=cats[0];\ndocument.getElementById('prose2').innerHTML='<b>Bed Warmer and Double Bed Warmer entrants repeat the most (~13%)<\/b>, followed by Foot Warmer (~11%) \u2014 winter buyers come back to add more cold-weather products. By contrast, <b>Cervical and Period/Back have the lowest repeat rates (~5\u20136%)<\/b> despite being top entry products: they pull volume but rarely trigger a second purchase. The opportunity is to attach Knee/Foot Warmer offers to Cervical buyers, who currently buy once and stop.';\n<\/script><\/body><\/html>"};
const loaded={};
function showTab(key){
 document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===key));
 document.querySelectorAll('.frame').forEach(f=>f.classList.toggle('active',f.dataset.key===key));
 const fr=document.getElementById('frame-'+key);
 if(!loaded[key]){fr.srcdoc=PAYLOADS[key];loaded[key]=true;}
}
showTab(Object.keys(PAYLOADS)[0]);
</script></body></html>
