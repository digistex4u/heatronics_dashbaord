r-box;margin:0;padding:0}\nbody{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;padding:32px 20px;max-width:1280px;margin:0 auto}\nh1{font-size:28px;color:#fff;margin-bottom:4px}\nh2{font-size:20px;color:#fff;margin:36px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}\nh3{font-size:15px;color:var(--orange);margin:18px 0 10px;letter-spacing:.3px}\n.sub{color:var(--mut);font-size:14px;margin-bottom:8px}\np{color:var(--txt);font-size:14px;margin:10px 0}\n.method{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:8px;padding:16px 18px;margin:18px 0;font-size:13px;color:var(--mut)}\n.method b{color:var(--txt)}\n.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}\n.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}\n.kpi .l{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}\n.kpi .v{font-size:24px;color:#fff;font-weight:600;margin-top:4px}\n.kpi .d{font-size:12px;margin-top:2px}\n.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin:16px 0}\n.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}\n.chartbox{position:relative;height:300px}\ntable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}\nth,td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--border)}\nth{color:var(--mut);font-weight:500;text-transform:uppercase;font-size:10.5px;letter-spacing:.4px}\ntd.l,th.l{text-align:left}\ntr:hover td{background:#1c2128}\n.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}\n.tf{background:rgba(247,120,186,.15);color:var(--pink)}\n.tm{background:rgba(88,166,255,.15);color:var(--blue)}\n.pill{font-size:11px;color:var(--mut)}\n.good{color:var(--green)}.bad{color:var(--red)}\nselect{background:var(--card) hart\"><\/canvas><\/div>\n<div class=\"legend\">Bars stacked by gender; hover any segment for exact purchase counts. Categories ordered by total volume.<\/div><\/div>\n\n<p id=\"personaProse\"><\/p>\n\n<h2>Category deep-dive \u2014 quarter by quarter<\/h2>\n<div class=\"sub\" style=\"margin-bottom:14px\">Pick a category to see how its persona, spend efficiency and reach shifted across quarters.<\/div>\n<select id=\"catSel\"><\/select>\n\n<div class=\"grid2\" style=\"margin-top:16px\">\n<div class=\"card\"><h3>Purchases by age &amp; gender, per quarter<\/h3><div class=\"chartbox\"><canvas id=\"catAgeChart\"><\/canvas><\/div><\/div>\n<div class=\"card\"><h3>Efficiency trend (ROAS &amp; Spend)<\/h3><div class=\"chartbox\"><canvas id=\"catEffChart\"><\/canvas><\/div><\/div>\n<\/div>\n\n<div class=\"card\"><h3>Aligned metrics by quarter<\/h3>\n<table id=\"catTable\"><thead><tr><th class=\"l\">Quarter<\/th><th>Purchases<\/th><th>Spend \u20b9<\/th><th>Revenue \u20b9<\/th><th>ROAS<\/th><th>CTR %<\/th><th>CPM \u20b9<\/th><th class=\"l\">Lead persona<\/th><\/tr><\/thead><tbody><\/tbody><\/table>\n<\/div>\n\n<div class=\"card\"><h3>Cell-level breakdown (selected category, all quarters combined)<\/h3>\n<table id=\"cellTable\"><thead><tr><th class=\"l\">Age<\/th><th class=\"l\">Gender<\/th><th>Purchases<\/th><th>Spend \u20b9<\/th><th>ROAS<\/th><th>CTR %<\/th><th>CPM \u20b9<\/th><\/tr><\/thead><tbody><\/tbody><\/table>\n<\/div>\n\n<div class=\"foot\">Heatronics_Ads (acct 2294012640954204) \u00b7 Meta Ads via Windsor.ai \u00b7 Digistex performance intelligence \u00b7 Generated [\"Q3'25\", \"Q4'25\", \"Q1'26\", \"Q2'26\"] coverage.<\/div>\n\n<script>\nconst D = {\"quarters\": [\"Q3'25\", \"Q4'25\", \"Q1'26\", \"Q2'26\"], \"ages\": [\"18-24\", \"25-34\", \"35-44\", \"45-54\", \"55-64\", \"65+\"], \"categories\": [\"Cervical / Neck\", \"Back / XL / Period\", \"Knee\", \"Knee + XL Bundle\", \"Period / Menstrual\", \"Bed Warmer\", \"Foot Warmer\", \"All / Multi-Product\"], \"data\": {\ };\nconst fDS=ages.map((a,i)=>({label:a,backgroundColor:ageColors[i],stack:'female',data:cats.map(c=>{const m=D.persona_totals[c][a+'|female'];return m?m.purch:0;})}));\nconst mDS=ages.map((a,i)=>({label:a+' ',backgroundColor:ageColors[i],stack:'male',data:cats.map(c=>{const m=D.persona_totals[c][a+'|male'];return m?m.purch:0;})}));\nnew Chart(document.getElementById('personaChart'),{type:'bar',data:{labels:cats,datasets:[...fDS,...mDS]},\n options:{maintainAspectRatio:false,responsive:true,\n  plugins:{legend:{display:false},\n   tooltip:{callbacks:{title:(it)=>cats[it[0].dataIndex],label:(c)=>{const stk=c.dataset.stack;return `${stk} ${c.dataset.label.trim()}: ${num(c.raw)}`;}}},\n   title:{display:true,text:'Left stack = Female \u00b7 Right stack = Male (per category)',color:'#8b949e',font:{size:12}}},\n  scales:{x:{stacked:true,ticks:{maxRotation:30,minRotation:0,font:{size:11}}},y:{stacked:true,title:{display:true,text:'Purchases'}}}}});\n\n// persona prose\nconst proseBits=[];\ncats.forEach(c=>{\n const cells=Object.entries(D.persona_totals[c]).sort((a,b)=>b[1].purch-a[1].purch);\n const tot=cells.reduce((s,x)=>s+x[1].purch,0);\n let f=0,m=0;cells.forEach(([k,v])=>{k.endsWith('female')?f+=v.purch:m+=v.purch;});\n const top=cells[0];const [ta,tg]=top[0].split('|');\n const skew=f>m?`${Math.round(f/tot*100)}% female`:`${Math.round(m/tot*100)}% male`;\n proseBits.push(`<b>${c}<\/b> (${num(tot)} buyers) skews ${skew}, led by ${ta} ${tg}.`);\n});\ndocument.getElementById('personaProse').innerHTML='The categories split cleanly along gender lines. '+proseBits.join(' ')+' In practice this means Cervical, Period and the softer pain categories should be served female-led creative aged 35+, while Knee and the Knee+XL bundle \u2014 the male-dominated volume engine \u2014 want male 25-54 messaging.';\n\n// category selector\nconst sel=document.getElementById('catSel');\ncats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});\nlet ageChart,effChart;\nfunction persona(cellObj){\n const e=Object.entries(cellObj).sort((a,b)=>b[1].purch-a[1].purch)[0];\n if(!e)return '\u2014';const [a,g]=e[0].split('|');return `${a} ${g}`;\n}\nfunction render(cat){\n // age chart per quarter (stacked gender), x=quarter\n const qs=D.quarters;\n const fData=qs.map(q=>{const cc=D.data[q][cat];if(!cc)return 0;return Object.entries(cc).filter(([k])=>k.endsWith('female')).reduce((s,[,v])=>s+v.purch,0);});\n const mData=qs.map(q=>{const cc=D.data[q][cat];if(!cc)return 0;return Object.entries(cc).filter(([k])=>k.endsWith('male')).reduce((s,[,v])=>s+v.purch,0);});\n if(ageChart)ageChart.destroy();\n ageChart=new Chart(document.getElementById('catAgeChart'),{type:'bar',data:{labels:qs,datasets:[\n   {label:'Female',backgroundColor:C.pink,data:fData},{label:'Male',backgroundColor:C.blue,data:mData}]},\n  options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true},y:{stacked:true,title:{display:true,text:'Purchases'}}}}});\n // eff chart\n const roas=qs.map(q=>{const t=D.cat_totals[q][cat];return t?t.roas:null;});\n const spend=qs.map(q=>{const t=D.cat_totals[q][cat];return t?t.spend:null;});\n if(effChart)effChart.destroy();\n effChart=new Chart(document.getElementById('catEffChart'),{data:{labels:qs,datasets:[\n   {type:'bar',label:'Spend \u20b9',data:spend,backgroundColor:'rgba(255,107,53,.4)',borderColor:C.orange,yAxisID:'y'},\n   {type:'line',label:'ROAS',data:roas,borderColor:C.green,backgroundColor:C.green,tension:.3,yAxisID:'y1',pointRadius:4}]},\n  options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{\n   y:{position:'left',title:{display:true,text:'Spend \u20b9'},ticks:{callback:v=>fmt(v)}},\n   y1:{position:'right',title:{display:true,text:'ROAS'},grid:{drawOnChartArea:false}}}}});\n // table per quarter\n const tb=document.querySelector('#catTable tbody');tb.innerHTML='';\n qs.forEach(q=>{const t=D.cat_totals[q][cat];const cc=D.data[q][cat];\n  if(!t){tb.innerHTML+=`<tr><td class=\"l\">${q}<\/td><td colspan=\"7\" class=\"l\" style=\"color:var(--mut)\">no spend<\/td><\/tr>`;return;}\n  const rcls=t.roas>=3?'good':(t.roas<2?'bad':'');\n  tb.innerHTML+=`<tr><td class=\"l\">${q}<\/td><td>${num(t.purch)}<\/td><td>${num(t.spend)}<\/td><td>${num(t.rev)}<\/td><td class=\"${rcls}\">${t.roas.toFixed(2)}\u00d7<\/td><td>${t.ctr.toFixed(2)}<\/td><td>${t.cpm.toFixed(0)}<\/td><td class=\"l\">${persona(cc)}<\/td><\/tr>`;});\n // cell table combined\n const cb=document.querySelector('#cellTable tbody');cb.innerHTML='';\n const combined=D.persona_totals[cat]||{};\n Object.entries(combined).sort((a,b)=>b[1].purch-a[1].purch).forEach(([k,v])=>{\n  const [a,g]=k.split('|');const tag=g==='female'?'<span class=\"tag tf\">F<\/span>':'<span class=\"tag tm\">M<\/span>';\n  const rcls=v.roas>=3?'good':(v.roas<2?'bad':'');\n  cb.innerHTML+=`<tr><td class=\"l\">${a}<\/td><td class=\"l\">${tag}<\/td><td>${num(v.purch)}<\/td><td>${num(v.spend)}<\/td><td class=\"${rcls}\">${v.roas.toFixed(2)}\u00d7<\/td><td>${v.ctr.toFixed(2)}<\/td><td>${v.cpm.toFixed(0)}<\/td><\/tr>`;});\n}\nsel.addEventListener('change',e=>render(e.target.value));\nrender(cats[0]);\n<\/script>\n<\/body><\/html>"};
const loaded = {};

  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===key));

}
